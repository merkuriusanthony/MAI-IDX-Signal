services:
  mai-idx-signal:
    image: ghcr.io/merkuriusanthony/mai-idx-signal:latest
    container_name: mai-idx-signal
    ports:
      - "7843:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
