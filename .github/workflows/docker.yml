name: Build & Test

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/merkuriusanthony/mai-idx-signal

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic-settings pytest pytest-asyncio \
            pandas numpy sqlalchemy aiosqlite httpx yfinance matplotlib \
            apscheduler python-telegram-bot python-dotenv pyarrow python-multipart
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  # Deploy is done manually via scripts/deploy_synology.sh
  # or triggered by a webhook/self-hosted runner on the NAS.
  # GitHub-hosted runners cannot reach Tailscale/LAN targets.
